<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EasyTraining</title>
<link rel="stylesheet" href="css/styles.css?v=4">
<style>
#boot{display:flex;flex-direction:column;align-items:center;justify-content:center;position:fixed;inset:0;z-index:9999;background:#080810;gap:16px}
#boot-icon{font-size:3rem}
#boot-text{color:#A0A0C0;font-size:.9rem;font-family:-apple-system,sans-serif}
#boot-err{display:none;background:rgba(239,68,68,.15);border:1px solid #EF4444;border-radius:10px;padding:16px;max-width:500px;color:#EF4444;font-size:.82rem;line-height:1.6;white-space:pre-wrap;font-family:monospace;margin-top:12px}
#root{height:100%}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-icon">⚡</div>
  <div id="boot-text">Ładowanie EasyTraining...</div>
  <div id="boot-err" id="boot-err"></div>
</div>
<div id="root"></div>

<!-- Error handler before scripts -->
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('boot-err');
  el.style.display = 'block';
  el.textContent = 'Błąd JavaScript:\n' + msg + '\nPlik: ' + src + '\nLinia: ' + line;
  document.getElementById('boot-text').textContent = 'Błąd ładowania — otwórz konsolę (F12) po szczegóły.';
};
window.ET = {};
</script>

<!-- React & ReactDOM (local, works offline and via file://) -->
<script src="js/vendor/react.development.js"></script>
<script src="js/vendor/react-dom.development.js"></script>

<!-- Supabase (sync konto — opcjonalny, offline nadal działa bez tego) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js?v=1"></script>

<!-- Core (TypeScript → bundle): event bus, wersjonowanie, migracja -->
<script src="js/core.bundle.js?v=11"></script>
<script>
// Bootstrap rdzenia: migracja legacy et_v1 (jednorazowa) + rejestracja silników.
try {
  window.etcore = ETCore.createCore();
  var __mig = window.etcore.migrate(localStorage.getItem('et_v1'));
  if (__mig.ran) console.log('[core] migracja et_v1:', __mig);
  // Workout Engine — resolver mięśni leniwy: baza ćwiczeń (window.ET) ładuje się później,
  // a zdarzenia WorkoutFinished i tak przychodzą dopiero po starcie aplikacji.
  ETCore.registerWorkoutEngine(window.etcore, function (name) {
    var ex = (window.ET && ET.EXERCISES_BASIC || []).find(function (e) { return e.name === name; });
    return ex && ex.muscles || [];
  });
  ETCore.registerFatigueEngine(window.etcore);
  ETCore.registerRecoveryEngine(window.etcore);
  ETCore.registerProgressEngine(window.etcore);
  ETCore.registerRunningEngine(window.etcore);
  window.etcore.user = ETCore.registerUserStore(window.etcore);
  // GoalProvider: cele powiązane z ćwiczeniem z legacy store (okres przejściowy)
  ETCore.registerOrmEngine(window.etcore, function (name) {
    var ex = (window.ET && ET.EXERCISES_BASIC || []).find(function (e) { return e.name === name; });
    return !!(ex && ex.isCompound);
  });
  ETCore.registerGoalEngine(window.etcore, function () {
    try {
      var s = JSON.parse(localStorage.getItem('et_v1') || '{}');
      return (s.goals || []).filter(function (g) { return g.linkType === 'exercise' && g.exercise && g.target > 0; })
        .map(function (g) { return { id: g.id, title: g.title, exercise: g.exercise, target: +g.target, current: +g.current || 0 }; });
    } catch (e) { return []; }
  });
} catch (e) { console.error('[core] bootstrap error:', e); }
</script>

<!-- Foundation -->
<script src="js/account-storage.js?v=1"></script>
<script src="js/store.js?v=12"></script>
<script src="js/navigation.js?v=11"></script>
